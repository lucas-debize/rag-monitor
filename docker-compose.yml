services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull mistral && ollama pull qwen2.5:1.5b && echo 'Modèles prêts'"
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
    working_dir: /mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:///mlflow/mlruns
      --default-artifact-root file:///mlflow/mlartifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: rag-monitor-app
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=mistral
      - JUDGE_MODEL=qwen2.5:1.5b
      - HF_HOME=/app/.cache/huggingface
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=rag-monitor
      - PROMPT_VERSION=v2
      - GIT_PYTHON_REFRESH=quiet
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - hf_cache:/app/.cache/huggingface
    command: sh -c "python src/ingestion.py && python -m src.run_evaluation --versions v1 v2 v3 --max-samples 5"

  streamlit:
    build: .
    container_name: rag-monitor-ui
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=mistral
      - HF_HOME=/app/.cache/huggingface
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=rag-monitor
      - PROMPT_VERSION=v2
      - GIT_PYTHON_REFRESH=quiet
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - hf_cache:/app/.cache/huggingface
    command: streamlit run /app/src/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true

volumes:
  ollama_data:
  hf_cache:
