name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest -v

  rag-evaluation:
    runs-on: ubuntu-latest
    needs: pytest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker compose build app

      - name: Run full RAG evaluation
        run: |
          docker compose run --rm app sh -c "python src/ingestion.py && python -m src.run_evaluation --versions v3 --check-threshold"

      - name: Show containers logs on failure
        if: failure()
        run: |
          docker compose logs
